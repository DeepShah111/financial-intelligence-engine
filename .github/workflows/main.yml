name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Push code files to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - << 'EOF'
          import os
          import glob
          from huggingface_hub import HfApi

          api = HfApi()
          repo_id = "deep123shah456/financial-intelligence-engine"
          token = os.environ["HF_TOKEN"]

          # Only upload code files — PDFs live permanently on the Space
          # and are NEVER touched by this workflow
          upload_patterns = [
              "app.py",
              "gradio_app.py",
              "requirements.txt",
              "README.md",
              ".gitattributes",
          ]

          # Add all files from these directories
          upload_dirs = ["src", "notebooks", "assets/demos"]

          files = []

          # Individual files
          for f in upload_patterns:
              if os.path.exists(f):
                  files.append(f)

          # Directory files
          for d in upload_dirs:
              for filepath in glob.glob(f"{d}/**", recursive=True):
                  if os.path.isfile(filepath):
                      files.append(filepath)

          print(f"Uploading {len(files)} files...")

          for filepath in files:
              try:
                  api.upload_file(
                      path_or_fileobj=filepath,
                      path_in_repo=filepath,
                      repo_id=repo_id,
                      repo_type="space",
                      token=token,
                  )
                  print(f"✅ {filepath}")
              except Exception as e:
                  print(f"❌ {filepath}: {e}")

          print("Sync complete.")
          EOF